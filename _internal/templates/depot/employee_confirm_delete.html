{% extends 'base.html' %}

{% block title %}Delete {{ employee.name }}{% endblock %}
{% block page_title %}<i class="fas fa-exclamation-triangle text-danger me-2"></i>Delete Employee{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center p-5">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                <h4>Delete {{ employee.name }}?</h4>
                <p class="text-muted">{{ employee.depot.name }} | ৳{{ employee.basic_salary|floatformat:0 }}</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2"><i class="fas fa-trash me-1"></i>Yes, Delete</button>
                    <a href="{% url 'depot:employee_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
