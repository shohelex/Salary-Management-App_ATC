{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}
{% block page_title %}<i class="fas fa-exclamation-triangle text-warning me-2"></i>Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-warning">
            <div class="card-body text-center p-5">
                <i class="fas fa-search fa-5x text-warning mb-4"></i>
                <h1 class="display-1 text-warning fw-bold">404</h1>
                <h4 class="mb-3">Page Not Found</h4>
                <p class="text-muted mb-4">
                    The page you're looking for doesn't exist or has been moved.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'core:dashboard' %}" class="btn btn-primary">
                        <i class="fas fa-home me-1"></i> Go to Dashboard
                    </a>
                    <button onclick="history.back()" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Go Back
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
